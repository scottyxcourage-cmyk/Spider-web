<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Reset Password • Spider Hub</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
  *{box-sizing:border-box}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0b0712;color:#fff;font-family:'Inter',sans-serif;padding:20px}
  .card{max-width:420px;width:100%;background:#171022;border:1px solid #2c1f42;border-radius:16px;
    padding:36px 28px}
  h1{font-family:'Orbitron',sans-serif;font-size:18px;margin:0 0 18px;color:#b388ff;text-align:center}
  p{color:#c9c3d8;line-height:1.5;font-size:14px;text-align:center}
  label{display:block;font-size:13px;color:#a89bc2;margin:14px 0 6px}
  input{width:100%;padding:13px 14px;border-radius:10px;border:1px solid #2c1f42;
    background:#0f0a18;color:#fff;font-size:15px}
  input:focus{outline:none;border-color:#7b2ff7}
  button{width:100%;margin-top:20px;padding:13px;border:none;border-radius:10px;
    background:#7b2ff7;color:#fff;font-weight:600;font-size:15px;cursor:pointer}
  button:disabled{opacity:.6}
  .msg{margin-top:14px;font-size:14px;text-align:center}
  .msg.error{color:#ff7b9c}
  .msg.success{color:#7be0a8}
  a.btn{display:block;text-align:center;margin-top:18px;color:#b388ff;text-decoration:none;font-size:14px}
</style>
</head>
<body>
  <div class="card">
    <h1>Reset Your Password</h1>
    <p>Choose a new password for your account.</p>
    <form id="form">
      <label for="pass">New password</label>
      <input id="pass" type="password" minlength="6" required placeholder="At least 6 characters"/>
      <label for="pass2">Confirm password</label>
      <input id="pass2" type="password" minlength="6" required placeholder="Repeat password"/>
      <button id="btn" type="submit">Reset Password</button>
    </form>
    <div id="msg" class="msg"></div>
    <a class="btn" href="/" style="display:none" id="login-link">Go to Spider Hub</a>
  </div>

  <script>
    const token = new URLSearchParams(location.search).get('token');
    const form = document.getElementById('form');
    const msg = document.getElementById('msg');
    const btn = document.getElementById('btn');
    const loginLink = document.getElementById('login-link');

    if (!token) {
      msg.textContent = 'Missing reset token. Please use the link from your email.';
      msg.className = 'msg error';
      form.style.display = 'none';
    }

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const pass = document.getElementById('pass').value;
      const pass2 = document.getElementById('pass2').value;
      msg.textContent = '';
      if (pass !== pass2) {
        msg.textContent = "Passwords don't match.";
        msg.className = 'msg error';
        return;
      }
      btn.disabled = true;
      btn.textContent = 'Resetting...';
      try {
        const res = await fetch('/api/auth/reset', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password: pass })
        });
        const data = await res.json();
        if (res.ok) {
          msg.textContent = data.message || 'Password updated!';
          msg.className = 'msg success';
          form.style.display = 'none';
          loginLink.style.display = 'block';
        } else {
          msg.textContent = data.error || 'Something went wrong.';
          msg.className = 'msg error';
          btn.disabled = false;
          btn.textContent = 'Reset Password';
        }
      } catch {
        msg.textContent = 'Could not reach the server. Please try again.';
        msg.className = 'msg error';
        btn.disabled = false;
        btn.textContent = 'Reset Password';
      }
    });
  </script>
</body>
</html>
